<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>สูตรอาหารไทย - Thai Recipe App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .selector-section {
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }
        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
        }
        .recipe-display {
            display: none;
            animation: fadeIn 0.3s;
        }
        .recipe-display.show {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .recipe-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .recipe-header h2 {
            margin-bottom: 5px;
        }
        .recipe-image {
            width: 100%;
            max-width: 400px;
            height: 250px;
            background: #e0e0e0;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            color: #999;
            font-size: 14px;
        }
        .recipe-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .section h3 {
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .ingredients {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
        }
        .ingredients li {
            margin-bottom: 8px;
            color: #333;
            list-style-position: inside;
        }
        .steps {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
        }
        .steps ol {
            margin-left: 20px;
        }
        .steps li {
            margin-bottom: 10px;
            color: #333;
            line-height: 1.5;
        }
        .comments-section {
            margin-top: 30px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        .comments-section h3 {
            margin-top: 0;
        }
        .comment-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        button:hover {
            background: #764ba2;
        }
        .comment-display {
            margin-top: 15px;
            padding: 10px;
            background: white;
            border-radius: 5px;
            border-left: 3px solid #ffc107;
        }
        .vulnerability-note {
            background: #fff3cd;
            border: 2px solid #ff6b6b;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-size: 13px;
            color: #333;
        }
        .vulnerability-note strong {
            color: #ff6b6b;
        }

                   2. Hardcoded credentials/API key in JavaScript
                 ================================================================== -->

            <div class="comments-section">

            </div>
        </div>

        // Show/hide recipe when selected
        document.getElementById('recipeSelect').addEventListener('change', function(e) {
            const selected = e.target.value;
            if (selected) {
                displayRecipe(selected);
                document.getElementById('recipeContainer').classList.add('show');
                document.getElementById('vulnNote').style.display = 'block';
            } else {
                document.getElementById('recipeContainer').classList.remove('show');
                document.getElementById('vulnNote').style.display = 'none';
            }
        });

        function displayRecipe(key) {
            const recipe = recipes[key];
            document.getElementById('recipeName').textContent = recipe.name;
            document.getElementById('recipeDesc').textContent = recipe.desc;

            // Display ingredients
            const ingredientsList = document.getElementById('ingredientsList');
            ingredientsList.innerHTML = '';
            recipe.ingredients.forEach(ing => {
                const li = document.createElement('li');
                li.textContent = ing;
                ingredientsList.appendChild(li);
            });

            // Display steps
            const stepsList = document.getElementById('stepsList');
            stepsList.innerHTML = '';
            recipe.steps.forEach((step, index) => {
                const li = document.createElement('li');
                li.textContent = step;
                stepsList.appendChild(li);
            });

            loadComments(key);
        }

        // ========== VULNERABILITY #2: XSS (Cross-Site Scripting) ==========
        // ⚠️ User input NOT sanitized - innerHTML allows script injection
        // AWS Security Agent should detect: Unsanitized user input to DOM
        // Example attack: <img src=x onerror="alert('XSS')">
        // ===================================================================
        function saveComment() {
            const commentInput = document.getElementById('userComment');
            const commentText = commentInput.value.trim();

            if (commentText === '') {
                alert('กรุณาพิมพ์ความเห็นของคุณ');
                return;
            }

            const selected = document.getElementById('recipeSelect').value;
            if (!selected) {
                alert('กรุณาเลือกสูตรก่อน');
                return;
            }

            // Get existing comments from localStorage
            const commentsKey = 'comments_' + selected;
            let comments = JSON.parse(localStorage.getItem(commentsKey)) || [];

            // Store comment (basic info without validation)
            comments.push({
                text: commentText,
                timestamp: new Date().toLocaleString('th-TH')
            });

            localStorage.setItem(commentsKey, JSON.stringify(comments));
            commentInput.value = '';
            loadComments(selected);
        }

        function loadComments(recipeKey) {
            const commentsKey = 'comments_' + recipeKey;
            const comments = JSON.parse(localStorage.getItem(commentsKey)) || [];
            const commentsDisplay = document.getElementById('commentsDisplay');

            commentsDisplay.innerHTML = '';

            if (comments.length === 0) {
                commentsDisplay.innerHTML = '<p style="color: #999;">ยังไม่มีความเห็น</p>';
                return;
            }

            comments.forEach((comment, index) => {
                const commentDiv = document.createElement('div');
                commentDiv.className = 'comment-display';

                // ⚠️ XSS VULNERABILITY: innerHTML without sanitization
                // If user input contains <script> or event handlers, it will execute
                commentDiv.innerHTML = `
                    <strong>ผู้แสดงความเห็นที่ ${index + 1}:</strong><br>
                    <span>${comment.text}</span><br>
                    <small style="color: #999;">${comment.timestamp}</small>
                `;

                commentsDisplay.appendChild(commentDiv);
            });
        }
